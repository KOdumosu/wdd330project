<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WanderLens</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>WanderLens</h1>

    <!-- SEARCH BAR-->
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search country, city, or place..." />
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <!-- COUNTRY INFO -->
      <section id="countryInfo">
        <p>Search for a country to see details</p>
      </section>

      <!-- PHOTO GALLERY -->
      <section id="photoGallery"></section>

      <!-- SHORTLIST -->
      <div class="shortlist-section">
        <h3>Shortlist</h3>
        <div id="shortlistModal"></div>
        <button id="openShortlist">Open Shortlist</button>
      </div>

    </div>

    <div class="right-panel">

  <!-- TRIPS CARD -->
  <div class="card trip-section">
    <h3>My Trips</h3>
    <div id="tripList"></div>
    <button id="createTripBtn">+ New Trip</button>
  </div>

  <!-- ITINERARY CARD -->
  <div class="card itinerary-section">
    <h3>Itinerary</h3>
    <button id="addDayBtn">+ Add Day</button>
    <div id="itineraryView"></div>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>

  </main>

  <!-- scripts -->
  <script type="module" src="js/app.js"></script>

  <div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle">Enter Name</h3>
    <input id="modalInput" type="text" />
    <button id="modalSave">Save</button>
    <button id="modalCancel">Cancel</button>
  </div>
</div>
</body>
